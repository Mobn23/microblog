---
-   name: Create virtual network
    azure_rm_virtualnetwork:
        resource_group: "{{ resource_group }}"
        name: "microblog-Vnet"
        address_prefixes: "10.0.0.0/16"
        tags: "{{ vmtags }}"


-   name: Add subnet
    azure_rm_subnet:
        resource_group: "{{ resource_group }}"
        name: "microblog-Subnet"
        address_prefix: "10.0.1.0/24"
        virtual_network: "microblog-Vnet"

# Create bootstrap NSGs here so NIC creation can attach to them and
# SSH remains available for the first configuration play. The final
# inbound rules are applied later by the security_groups role after VM
# addresses have been gathered.
-   name: Create initial NSGs for VM network interfaces
    azure_rm_securitygroup:
        resource_group: "{{ resource_group }}"
        name: "{{ item }}-sg"
        purge_rules: yes
        rules:
            - name: SSH
              protocol: Tcp
              destination_port_range: 22
              access: Allow
              priority: 1001
              direction: Inbound
              source_address_prefix: '0.0.0.0/0'
        tags: "{{ vmtags }}"
    loop:
        - appserver
        - database
        - loadbalancer
